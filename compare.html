<script>
    function getItemsHTML(brand) {
        switch (brand) {
            case "luxury Sofas": return `
                <option selected disabled>select Item</option>
                <option>sectional sofa</option>
                <option>livingroom sofa</option>
                <option>Daybed sofa</option>
                <option>office sofa</option>`;

            case "Grand sofas": return `
                <option selected disabled>select Item</option>
                <option>hotel elite sofa</option>
                  <option>5 seater sofa</option>
                <option>wingback sofa</option>
                <option>loveseat sofa</option>
              `;

            case "Chenone sofas": return `
                <option selected disabled>select Item</option>
                <option>chesterfield sofa</option>
                <option>Recliner sofa</option>
                <option>Sleeper sofa</option>
                <option>loveseat sofa</option>
                `;

            case "Interwood sofas": return `
                <option selected disabled>select Item</option>
                <option>Chaise lounge sofa</option>
                <option>English rolled arm sofa</option>
                <option>Diwaan sofa</option>`;

            case "Habitt sofas": return `
                <option selected disabled>select Item</option>
                <option>Sectional sofa</option>
                <option>Midcentury modern sofa</option>
                <option>Tuxedo sofa</option>`;

            case "Modern sofas": return `
                <option selected disabled>select Item</option>
                <option>Wooden frames sofa</option>
                <option>Fabric sofa</option>
                <option>Livingroom sofa</option>`;

            default: return '';
        }
    }
    function getCardHTML(item) {
        switch (item) {
            case "sectional sofa": return `
                <div class="card text-center my-1"><div class="card-body">
                <img src="assets/Royalchsterfield.jpeg" class="img-fluid">
                <div class="card-title"><h3 class="text-center">Sectional Sofa</h3>
                <p>A large L-shape or U-shape sofa made of multiple joined sections. Perfect for spacious living rooms and corner spaces.</p>
                </div></div></div>`;

            case "livingroom sofa": return `
                <div class="card text-center my-1"><div class="card-body">
              <img src="assets/C2.jpg" class="img-fluid">
                <div class="card-title"><h3 class="text-center">Living Room Sofa</h3>
                <p>A stylish and durable sofa designed for daily use in the main seating area of your home. Available in many designs and sizes.</p>
                </div></div></div>`;

            case "Daybed sofa": return `
                <div class="card text-center my-1"><div class="card-body">
                <img src="assets/Cd.jpeg" class="img-fluid">
                <div class="card-title"><h3 class="text-center">Daybed Sofa</h3>
                <p>A dual-purpose sofa that functions as both a seat and a bed. Ideal for guest rooms and small spaces.</p>
                </div></div></div>`;

            case "office sofa": return `
                <div class="card text-center my-1"><div class="card-body">
                <img src="assets/Co.jpeg" class="img-fluid">
                <div class="card-title"><h3 class="text-center">Office Sofa</h3>
                <p>A formal and professional sofa designed for offices, reception areas, and waiting rooms. Easy to clean and maintain.</p>
                </div></div></div>`;

            case "hotel elite sofa": return `
                <div class="card text-center my-1"><div class="card-body">
                <img src="assets/S1.jpeg" class="img-fluid">
                <div class="card-title"><h3 class="text-center">Hotel Elite Sofa</h3>
                <p>A premium quality sofa crafted for luxury hotels and high-end lounges. Combines elegance, durability, and superior comfort.</p>
                </div></div></div>`;
       case "5 seater sofa": return `
                <div class="card text-center my-1"><div class="card-body">
                <img src="assets/G2.jpeg" class="img-fluid">
                <div class="card-title"><h3 class="text-center">5 Seater Sofa</h3>
                <p>A large family sofa offering seating for five people. Ideal for big families and spacious living rooms with maximum comfort.</p>
                </div></div></div>`;

            case "wingback sofa": return `
                <div class="card text-center my-1"><div class="card-body">
                <img src="assets/G4.jpeg" class="img-fluid">
                <div class="card-title"><h3 class="text-center">Wingback Sofa</h3>
                <p>A classic sofa featuring high back and side wings for head and shoulder support. Adds a regal and timeless look to any room.</p>
                </div></div></div>`;

            case "loveseat sofa": return `
                <div class="card text-center my-1"><div class="card-body">
                <img src="assets/G6.jpeg" class="img-fluid">
                <div class="card-title"><h3 class="text-center">Loveseat Sofa</h3>
                <p>A compact two-seater sofa perfect for couples or small spaces. Cozy, stylish, and available in fabric, leather, and velvet.</p>
                </div></div></div>`;

     
            case "chesterfield sofa": return `
                <div class="card text-center my-1"><div class="card-body">
                <img src="assets/C1.jpeg" class="img-fluid">
                <div class="card-title"><h3 class="text-center">Chesterfield Sofa</h3>
                <p>A timeless classic with deep button tufting and rolled arms. Known for its iconic design and luxurious appearance in any setting.</p>
                </div></div></div>`;

            case "Recliner sofa": return `
                <div class="card text-center my-1"><div class="card-body">
                <img src="assets/Cw.jpeg" class="img-fluid">
                <div class="card-title"><h3 class="text-center">Recliner Sofa</h3>
                <p>A comfort-focused sofa with adjustable backrest and footrest. Available in manual and electric options for ultimate relaxation.</p>
                </div></div></div>`;

            case "Sleeper sofa": return `
                <div class="card text-center my-1"><div class="card-body">
                <img src="assets/S4.jpeg" class="img-fluid">
                <div class="card-title"><h3 class="text-center">Sleeper Sofa</h3>
                <p>A space-saving sofa that converts into a full bed. Great for studio apartments and overnight guests with a hidden foldable mattress.</p>
                </div></div></div>`;

            case "Modular sofa": return `
                <div class="card text-center my-1"><div class="card-body">
                <img src="assets/C2.jpg" class="img-fluid">
                <div class="card-title"><h3 class="text-center">Modular Sofa</h3>
                <p>A flexible sofa made of individual units that can be arranged in any configuration. Perfect for modern homes and open-plan living areas.</p>
                </div></div></div>`;

            case "Chaise lounge sofa": return `
                <div class="card text-center my-1"><div class="card-body">
                <img src="assets/I1.jpg" class="img-fluid">
                <div class="card-title"><h3 class="text-center">Chaise Lounge Sofa</h3>
                <p>An elegant elongated chair that lets you fully stretch your legs. Available with one arm, two arms, or armless for a luxurious lounging experience.</p>
                </div></div></div>`;

            case "English rolled arm sofa": return `
                <div class="card text-center my-1"><div class="card-body">
                <img src="assets/I2.webp" class="img-fluid">
                <div class="card-title"><h3 class="text-center">English Rolled Arm Sofa</h3>
                <p>A cozy country-house style sofa with low rounded arms and deep plush cushions. Timeless, warm, and perfect for traditional interiors.</p>
                </div></div></div>`;

            case "Diwaan sofa": return `
                <div class="card text-center my-1"><div class="card-body">
                <img src="assets/I3.jpg" class="img-fluid">
                <div class="card-title"><h3 class="text-center">Diwaan Sofa</h3>
                <p>A traditional backrest-free sofa rooted in Eastern design. Placed against a wall, decorative cushions serve as the back for a cultural and elegant look.</p>
                </div></div></div>`;

            case "Sectional sofa": return `
                <div class="card text-center my-1"><div class="card-body">
                <img src="assets/I4.webp" class="img-fluid">
                <div class="card-title"><h3 class="text-center">Sectional Sofa</h3>
                <p>A large modular sofa configurable in L or U-shape. Built for spacious rooms and big families with maximum comfort and seating capacity.</p>
                </div></div></div>`;

            case "Midcentury modern sofa": return `
                <div class="card text-center my-1"><div class="card-body">
                <img src="assets/I5.webp" class="img-fluid">
                <div class="card-title"><h3 class="text-center">Mid-Century Modern Sofa</h3>
                <p>A sleek minimalist sofa with tapered wooden legs inspired by 1950s design. Compact and stylish, ideal for modern and contemporary interiors.</p>
                </div></div></div>`;

            case "Tuxedo sofa": return `
                <div class="card text-center my-1"><div class="card-body">
                <img src="assets/I6.webp" class="img-fluid">
                <div class="card-title"><h3 class="text-center">Tuxedo Sofa</h3>
                <p>A bold architectural sofa where arms and back stand at equal height. Its sharp, boxy silhouette radiates sophistication and formal elegance.</p>
                </div></div></div>`;

            case "Wooden frames sofa": return `
                <div class="card text-center my-1"><div class="card-body">
                <img src="assets/Cw.jpeg" class="img-fluid">
                <div class="card-title"><h3 class="text-center">Wooden Frame Sofa</h3>
                <p>A strong and durable sofa built on a solid wood frame. Covered with premium cushions and fabric, it provides long-lasting support and classic style.</p>
                </div></div></div>`;
            case "Fabric sofa": return `
                <div class="card text-center my-1"><div class="card-body">
                <img src="assets/M2.jpeg" class="img-fluid">
                <div class="card-title"><h3 class="text-center">Fabric Sofa</h3>
                <p>A comfortable and stylish sofa upholstered in high-quality fabric. Breathable, soft, and available in a wide range of colors and textures.</p>
                </div></div></div>`;

            case "Livingroom sofa": return `
                <div class="card text-center my-1"><div class="card-body">
                <img src="assets/S4.jpeg" class="img-fluid">
                <div class="card-title"><h3 class="text-center">Sleeper Sofa</h3>
                <p>A smart space-saving sofa that converts into a comfortable bed. Perfect for small homes, studio apartments, and accommodating overnight guests.</p>
                </div></div></div>`;

            default: return '';
        }
    }

  
    function selectbrand1() {
        let brand = document.getElementById("Brand1").value;
        document.getElementById("item1").innerHTML = getItemsHTML(brand);
        document.getElementById("result1").innerHTML = "";
    }

    function Selectitem1() {
        let item = document.getElementById("item1").value;
        document.getElementById("result1").innerHTML = getCardHTML(item);
    }

    function selectbrand2() {
        let brand = document.getElementById("Brand2").value;
        document.getElementById("item2").innerHTML = getItemsHTML(brand);
        document.getElementById("result2").innerHTML = "";
    }

    function Selectitem2() {
        let item = document.getElementById("item2").value;
        document.getElementById("result2").innerHTML = getCardHTML(item);
    }

</script>
