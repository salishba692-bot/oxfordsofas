<div class="col col-lg-4 col-md-6 my-5">

<h1 class="text-center fs-10 mt-3">Contact us</h1>
<div class="container my-5">
  <div class="offset-sm-2 col-sm-8 col-lg-8 offset-lg-2">
    
    <form id="myForm"
      data-aos="fade-up"
      data-aos-duration="1000">

      <div class="form-group mb-3">
        <label>Name</label>
        <input type="text" id="name" 
  name="name" required
    pattern="[A-Z][A-Za-z\s]*" 
placeholder="Alishba Shahid..."  class="form-control">
      </div>

      <div class="form-group mb-3">
        <label>Email</label>
       <input 
  type="email"   class="form-control" placeholder="Input your email"
    pattern="[a-zA-Z0-9._%+\-]+@gmail\.com" required
>   
            </div>
      <div class="form-group mb-3">
        <label>Message</label>
        <textarea id="message" required placeholder="Type your message here..." class="form-control"></textarea>
          </div>

      <div class="form-group mt-4">
        <button class="btn w-100 btn-gold" value="submit">Submit</button>
      </div>

    </form>
  </div>
</div>
